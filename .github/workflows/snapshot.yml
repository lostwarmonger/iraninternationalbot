name: YouTube Live Screenshot (Cookies)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run snapshot script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          YOUTUBE_URL: ${{ secrets.YOUTUBE_URL }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python main.py

      - name: If failed, show tip
        if: failure()
        run: |
          echo "❌ Job failed. Quick checks:"
          echo "1. Are cookies still valid? (they expire)"
          echo "2. Is stream LIVE and public?"
          echo "3. Try manual run again in 1-2 min"
